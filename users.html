<!doctype html>
<html lang="uk">
<head>
  <title>REBUS — Користувачі</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/favicon.png?v=20260612-nq-actions" />
  <link rel="shortcut icon" type="image/png" href="assets/favicon.png?v=20260612-nq-actions" />
  <link rel="apple-touch-icon" href="assets/favicon.png?v=20260612-nq-actions" />
  <link rel="stylesheet" href="css/styles.css?v=20260624-contours-v1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js" defer></script>
  <script src="js/admin-common.js" defer></script>
  <style>
    .role-picker-grid{
      display:grid!important;
      grid-template-columns:repeat(2,minmax(0,1fr))!important;
      gap:14px!important;
      padding:22px 28px 28px!important;
      overflow:visible!important;
    }
    .role-choice-card{
      position:relative!important;
      overflow:hidden!important;
      min-height:112px!important;
      padding:26px 22px!important;
      gap:16px!important;
    }
    .role-choice-card.current-role{
      padding-top:56px!important;
      padding-right:22px!important;
    }
    .role-choice-card.current-role{
      border-color:#ff5b87!important;
      background:linear-gradient(135deg,rgba(139,22,55,.72),rgba(44,22,31,.88))!important;
      box-shadow:0 0 0 1px rgba(255,91,135,.35),0 18px 42px rgba(139,22,55,.22)!important;
    }
    .current-role-badge{
      position:absolute!important;
      top:16px!important;
      left:22px!important;
      right:auto!important;
      transform:none!important;
      max-width:calc(100% - 44px)!important;
      white-space:nowrap!important;
      overflow:hidden!important;
      text-overflow:ellipsis!important;
      padding:7px 11px!important;
      border-radius:999px!important;
      background:rgba(255,91,135,.20)!important;
      border:1px solid rgba(255,91,135,.58)!important;
      color:#ffb4c9!important;
      font-weight:900!important;
      font-size:10px!important;
      line-height:1!important;
      text-transform:uppercase!important;
      letter-spacing:.045em!important;
      z-index:4!important;
      box-sizing:border-box!important;
    }
    .role-choice-icon{
      width:44px!important;
      height:44px!important;
      display:grid!important;
      place-items:center!important;
      border-radius:14px!important;
      background:rgba(139,22,55,.38)!important;
      border:1px solid rgba(255,91,135,.22)!important;
      flex:0 0 44px!important;
    }
    .role-choice-icon img{
      width:28px!important;
      height:28px!important;
      object-fit:contain!important;
      filter:brightness(0) invert(1)!important;
    }
    .status-toggle-layout{
      display:grid!important;
      grid-template-columns:1.25fr .9fr!important;
      gap:24px!important;
      padding:30px 32px 34px!important;
      box-sizing:border-box!important;
      overflow:visible!important;
      align-items:stretch!important;
    }
    .status-toggle-card{
      border:1px solid rgba(255,255,255,.12)!important;
      background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03))!important;
      border-radius:18px!important;
      padding:18px 22px!important;
      display:flex!important;
      align-items:center!important;
      gap:18px!important;
      text-align:left!important;
      color:#fff!important;
      cursor:pointer!important;
      min-height:108px!important;
      box-sizing:border-box!important;
    }
    .status-toggle-card > div,
    .delete-user-tile > div{
      display:flex!important;
      flex-direction:column!important;
      gap:7px!important;
      min-width:0!important;
    }
    .status-toggle-card strong,
    .delete-user-tile strong{
      display:block!important;
      margin-bottom:5px!important;
      line-height:1.2!important;
    }
    .status-toggle-card small,
    .delete-user-tile small{
      display:block!important;
      line-height:1.35!important;
      color:rgba(255,255,255,.68)!important;
    }
    .status-toggle-card.is-active{
      border-color:rgba(31,209,103,.45)!important;
      box-shadow:0 18px 42px rgba(31,209,103,.12)!important;
    }
    .status-toggle-card.is-inactive{
      border-color:rgba(255,91,135,.45)!important;
      box-shadow:0 18px 42px rgba(255,91,135,.12)!important;
    }
    .status-toggle-switch{
      width:58px!important;
      height:32px!important;
      border-radius:999px!important;
      background:rgba(255,91,135,.35)!important;
      border:1px solid rgba(255,91,135,.45)!important;
      position:relative!important;
      flex:0 0 58px!important;
    }
    .status-toggle-switch span{
      position:absolute!important;
      width:24px!important;
      height:24px!important;
      top:3px!important;
      left:4px!important;
      border-radius:50%!important;
      background:#fff!important;
      box-shadow:0 6px 14px rgba(0,0,0,.35)!important;
      transition:.18s!important;
    }
    .status-toggle-card.is-active .status-toggle-switch{
      background:rgba(31,209,103,.35)!important;
      border-color:rgba(31,209,103,.65)!important;
    }
    .status-toggle-card.is-active .status-toggle-switch span{left:28px!important}
    .delete-user-tile{
      min-height:108px!important;
      box-sizing:border-box!important;
      gap:18px!important;
    }
    @media(max-width:860px){
      .role-picker-grid,.status-toggle-layout{grid-template-columns:1fr!important}
      .role-choice-card{padding:22px!important}
      .role-choice-card.current-role{padding-top:56px!important}
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><img src="assets/favicon.png" alt="REBUS"><h1>REBUS <span>Admin</span></h1></div>
      <nav class="nav">
        <a href="dashboard.html">Головна</a>
        <a class="active" href="users.html">Користувачі</a>
        <a href="access.html">Надати доступ</a>
        <a href="contours.html">Контури</a>
        <a href="events.html">Журнал</a>
      </nav>
      <div class="sidebar-footer"><button id="logoutBtn" class="logout-btn" type="button">Вийти</button></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h2>Користувачі</h2>
        <div class="user-pill" id="adminEmail"></div>
      </div>

      <section class="panel tools-panel">
        <div class="search-row">
          <div class="search-box"><input id="searchInput" class="search-input" placeholder="Пошук по email, маркеру або ролі..."></div>
        </div>
        <div class="filter-row">
          <button class="filter-btn active" data-filter="all">Всі <span id="countAll" class="count-pill">0</span></button>
          <button class="filter-btn" data-filter="active">Активні <span id="countActive" class="count-pill">0</span></button>
          <button class="filter-btn" data-filter="inactive">Неактивні <span id="countInactive" class="count-pill">0</span></button>
          <button class="filter-btn" data-filter="deleted">Видалені <span id="countDeleted" class="count-pill">0</span></button>
        </div>
      </section>

      <section class="panel table-panel">
        <div id="notice"></div>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th class="sortable" data-sort="marker">Маркер ⇅</th>
                <th class="sortable" data-sort="email">Email ⇅</th>
                <th class="sortable" data-sort="role">Роль ⇅</th>
                <th class="sortable" data-sort="contour_count">Контур ⇅</th>
                <th class="sortable" data-sort="status">Статус ⇅</th>
                <th class="sortable" data-sort="last_login">Останній вхід ⇅</th>
                <th class="sortable" data-sort="created_at">Створений ⇅</th>
                <th>Дії</th>
              </tr>
            </thead>
            <tbody id="usersBody"><tr><td colspan="8">Завантаження...</td></tr></tbody>
          </table>
        </div>
        <div class="footer-row">
          <div id="shownCount" class="muted">Показано: 0 користувачів</div>
          <div class="pagination"><button id="prevPage" class="page-btn">‹</button><button id="pageNo" class="page-btn active">1</button><button id="nextPage" class="page-btn">›</button></div>
        </div>
      </section>
    </main>
  </div>

  <div id="userActionModal" class="modal-backdrop rebus-action-modal" hidden>
    <div class="modal action-dialog" role="dialog" aria-modal="true" aria-labelledby="actionModalTitle">
      <div class="modal-head">
        <div><div id="actionModalKicker" class="modal-kicker">Керування користувачем</div><h3 id="actionModalTitle">Дії</h3><p id="actionModalSub" class="modal-sub"></p></div>
        <button id="closeActionModal" class="modal-close" type="button">×</button>
      </div>
      <div id="actionModalBody" class="action-grid"></div>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const { supabase } = window.rebusAuth;
      const A = window.rebusAdmin;
      const ctx = await A.getAdminContext(); if (!ctx) return;
      A.renderAdminProfile(document.getElementById('adminEmail'), ctx.session, ctx.admin);

      const state = { users: [], contours: [], memberships: [], filter:'all', query:'', sort:'marker', dir:1, page:1, pageSize:8, profilesAvailable:true, contoursAvailable:true };
      const usersBody = document.getElementById('usersBody');
      const notice = document.getElementById('notice');
      const actionModal = document.getElementById('userActionModal');
      const actionModalKicker = document.getElementById('actionModalKicker');
      const actionModalTitle = document.getElementById('actionModalTitle');
      const actionModalSub = document.getElementById('actionModalSub');
      const actionModalBody = document.getElementById('actionModalBody');
      const ROLE_META = {
        user:{label:'Користувач', desc:'Базове шифрування файлів', icon:'assets/role-user.svg'},
        operator:{label:'Оператор', desc:'Розшифрування в межах контуру', icon:'assets/role-operator.svg'},
        admin:{label:'Адміністратор', desc:'Керування користувачами і контурами', icon:'assets/role-admin.svg'},
        super_admin:{label:'Суперадміністратор', desc:'Повні права системи', icon:'assets/role-superadmin.svg'}
      };

      function setNotice(text, type='') { notice.innerHTML = text ? `<div class="notice ${type}">${A.esc(text)}</div>` : ''; }
      function sameUserMembership(m, u){ return String(m.user_id || '') === String(u.id) || String(m.email || '').toLowerCase() === String(u.email || '').toLowerCase(); }

      async function loadUsers(){
        usersBody.innerHTML = '<tr><td colspan="8">Завантаження...</td></tr>';
        setNotice('');
        let rows = []; let source = 'profiles';
        const profileResp = await supabase.from('rebus_profiles').select('*').order('created_at', { ascending:false });
        if (!profileResp.error) rows = profileResp.data || [];
        else {
          state.profilesAvailable = false; source = 'admin_access';
          const adminResp = await supabase.from('rebus_admin_access').select('*').order('created_at', { ascending:false });
          if (adminResp.error) {
            usersBody.innerHTML = `<tr><td colspan="8">Помилка завантаження: ${A.esc(adminResp.error.message)}</td></tr>`;
            setNotice(`rebus_profiles недоступна (${profileResp.error.message}). rebus_admin_access також не читається (${adminResp.error.message}).`, 'error'); return;
          }
          rows = adminResp.data || [];
          setNotice(`Увага: rebus_profiles недоступна (${profileResp.error.message}). Показано резервні дані з rebus_admin_access.`, '');
        }
        state.users = rows.map(r => A.mapUser({...r, source}));
        await loadContours(); applyContourNames(); render();
      }

      async function loadContours(){
        const [contoursResp, membersResp] = await Promise.all([
          supabase.from('rebus_contours').select('*').order('name', { ascending:true }),
          supabase.from('rebus_contour_members').select('*')
        ]);
        if (contoursResp.error || membersResp.error) {
          state.contoursAvailable = false; state.contours = []; state.memberships = [];
          setNotice(`Контури ще не налаштовані в Supabase. Застосуй SQL з файлу supabase-contours.sql. ${contoursResp.error ? contoursResp.error.message : membersResp.error.message}`, ''); return;
        }
        state.contoursAvailable = true; state.contours = contoursResp.data || []; state.memberships = membersResp.data || [];
      }

      function applyContourNames(){
        const contourMap = new Map(state.contours.map(c => [String(c.id), c]));
        state.users.forEach(u => {
          const memberships = state.memberships.filter(m => sameUserMembership(m, u));
          const contours = memberships.map(m => ({ membership: m, contour: contourMap.get(String(m.contour_id)) })).filter(x => x.contour);
          u.contour_memberships = contours;
          u.contour_count = contours.length;
          u.contour_name = contours.length ? contours.map(x => x.contour.name).join(', ') : 'Без контуру';
        });
      }

      function contourCountButton(u){
        const count = Number(u.contour_count || 0);
        const label = count === 1 ? 'контур' : count > 1 && count < 5 ? 'контури' : 'контурів';
        return `<button class="contour-count-btn ${count ? 'has-contours' : ''}" data-open-contours="${A.esc(u.id)}" type="button"><strong>${count}</strong><span>${label}</span></button>`;
      }

      function availableContoursFor(u){
        const assigned = new Set((u.contour_memberships || []).map(x => String(x.contour.id)));
        return state.contours.filter(c => c.is_active !== false && !assigned.has(String(c.id)));
      }

      function openContourModal(id){
        const u = state.users.find(x => String(x.id) === String(id)); if (!u) return;
        actionModalKicker.textContent = 'Контури доступу'; actionModalTitle.textContent = u.marker || 'Користувач';
        actionModalSub.textContent = `${u.email} · ${u.contour_count || 0} контурів`;
        renderContourModalBody(u);
        showModal();
      }

      function renderContourModalBody(u){
        const memberships = u.contour_memberships || [];
        const available = availableContoursFor(u);
        const currentHtml = memberships.length ? memberships.map(({ membership, contour }) => `
          <div class="contour-item">
            <div><strong>${A.esc(contour.name)}</strong><small>${A.esc(contour.description || 'Без опису')}</small></div>
            <button class="contour-remove-btn" data-remove-contour="${A.esc(membership.id)}" data-user-id="${A.esc(u.id)}" type="button">Прибрати</button>
          </div>`).join('') : '<div class="contour-empty">Користувач ще не належить до жодного контуру</div>';
        const addHtml = available.length ? `
          <div class="contour-add-row">
            <select class="contour-add-select" data-add-contour-select="${A.esc(u.id)}">
              <option value="">Обери контур для додавання</option>
              ${available.map(c => `<option value="${A.esc(c.id)}">${A.esc(c.name)}</option>`).join('')}
            </select>
            <button class="btn contour-add-btn" data-add-contour-user="${A.esc(u.id)}" type="button">Додати</button>
          </div>` : '<div class="contour-empty">Усі активні контури вже додані</div>';
        actionModalBody.className = 'contour-modal-body';
        actionModalBody.innerHTML = `<div class="contour-list">${currentHtml}</div>${addHtml}`;
      }

      async function addUserContour(userId, contourId){
        const u = state.users.find(x => String(x.id) === String(userId)); if (!u || !contourId) return;
        const already = state.memberships.some(m => sameUserMembership(m, u) && String(m.contour_id) === String(contourId));
        if (already) { setNotice('Цей контур уже доданий користувачу.', ''); return; }
        const contour = state.contours.find(c => String(c.id) === String(contourId));
        const { error } = await supabase.from('rebus_contour_members').insert({
          contour_id: contourId, user_id: u.id, email: u.email, role: u.role, marker: u.marker,
          added_by: ctx.session?.user?.email || null, created_at: new Date().toISOString()
        });
        if (error) { setNotice(error.message || 'Не вдалося додати контур.', 'error'); return; }
        await A.logEvent(supabase, { marker:u.marker, email:u.email, action:`Додано до контуру: ${contour?.name || contourId}`, status:'success' });
        await loadContours(); applyContourNames(); render();
        const fresh = state.users.find(x => String(x.id) === String(userId)); if (fresh && !actionModal.hidden) { actionModalSub.textContent = `${fresh.email} · ${fresh.contour_count || 0} контурів`; renderContourModalBody(fresh); }
        setNotice('Контур додано користувачу.', 'ok');
      }

      async function removeUserContour(userId, membershipId){
        const u = state.users.find(x => String(x.id) === String(userId)); if (!u || !membershipId) return;
        const membership = state.memberships.find(m => String(m.id) === String(membershipId));
        const contour = state.contours.find(c => String(c.id) === String(membership?.contour_id));
        const { error } = await supabase.from('rebus_contour_members').delete().eq('id', membershipId);
        if (error) { setNotice(error.message || 'Не вдалося прибрати контур.', 'error'); return; }
        await A.logEvent(supabase, { marker:u.marker, email:u.email, action:`Прибрано з контуру: ${contour?.name || membershipId}`, status:'success' });
        await loadContours(); applyContourNames(); render();
        const fresh = state.users.find(x => String(x.id) === String(userId)); if (fresh && !actionModal.hidden) { actionModalSub.textContent = `${fresh.email} · ${fresh.contour_count || 0} контурів`; renderContourModalBody(fresh); }
        setNotice('Контур прибрано.', 'ok');
      }

      function filtered(){
        let list = [...state.users];
        if (state.filter !== 'all') list = list.filter(u => u.status === state.filter);
        const q = state.query.trim().toLowerCase();
        if (q) list = list.filter(u => [u.marker,u.email,u.full_name,A.roleLabel(u.role),u.contour_name,u.status].join(' ').toLowerCase().includes(q));
        list.sort((a,b) => {
          const av = a[state.sort] ?? '';
          const bv = b[state.sort] ?? '';
          if (typeof av === 'number' || typeof bv === 'number') return (Number(av) - Number(bv)) * state.dir;
          return String(av).localeCompare(String(bv), 'uk', { numeric:true }) * state.dir;
        });
        return list;
      }

      function updateCounts(){
        countAll.textContent = state.users.length; countActive.textContent = state.users.filter(u=>u.status==='active').length;
        countInactive.textContent = state.users.filter(u=>u.status==='inactive').length; countDeleted.textContent = state.users.filter(u=>u.status==='deleted').length;
      }

      function render(){
        updateCounts(); const list = filtered(); const totalPages = Math.max(1, Math.ceil(list.length / state.pageSize)); state.page = Math.min(state.page, totalPages);
        const pageItems = list.slice((state.page-1)*state.pageSize, state.page*state.pageSize);
        usersBody.innerHTML = pageItems.length ? pageItems.map(userRow).join('') : '<tr><td colspan="8">Користувачів не знайдено</td></tr>';
        shownCount.textContent = `Показано: ${pageItems.length ? ((state.page-1)*state.pageSize+1) : 0}-${Math.min(state.page*state.pageSize, list.length)} із ${list.length} користувачів`;
        pageNo.textContent = state.page; prevPage.disabled = state.page <= 1; nextPage.disabled = state.page >= totalPages;
      }

      function userRow(u){
        const avatar = u.avatar_url ? `<img class="mini-avatar" src="${A.esc(u.avatar_url)}" alt="">` : `<div class="mini-avatar">${A.esc(A.initials(u.full_name,u.email))}</div>`;
        return `<tr data-id="${A.esc(u.id)}">
          <td>${A.esc(u.marker)}</td>
          <td><div class="user-cell">${avatar}<div><div class="email-main">${A.esc(u.email)}</div><div class="email-sub">${A.esc(u.full_name || u.email)}</div></div></div></td>
          <td><button class="role-edit-btn role-badge role-${A.esc(u.role)}" data-open-role="${A.esc(u.id)}" type="button">${A.esc(A.roleLabel(u.role))}</button></td>
          <td>${contourCountButton(u)}</td>
          <td><span class="status-badge status-${A.esc(u.status)}">${A.esc(A.statusLabel(u.status))}</span></td>
          <td>${A.esc(A.fmtDate(u.last_login))}</td><td>${A.esc(A.fmtDate(u.created_at))}</td>
          <td><button class="dots-btn" data-open-status="${A.esc(u.id)}" type="button" aria-label="Дії користувача">⋮</button></td>
        </tr>`;
      }

      function openStatusModal(id){
        const u = state.users.find(x => String(x.id) === String(id)); if (!u) return;
        const isActive = u.status === 'active';
        const nextStatus = isActive ? 'inactive' : 'active';
        actionModalKicker.textContent = 'Статус користувача'; actionModalTitle.textContent = u.marker || 'Користувач';
        actionModalSub.textContent = `${u.email} · ${A.roleLabel(u.role)} · ${A.statusLabel(u.status)}`;
        actionModalBody.className = 'status-toggle-layout';
        actionModalBody.innerHTML = `
          <button class="status-toggle-card ${isActive ? 'is-active' : 'is-inactive'}" data-action="status" data-value="${nextStatus}" data-id="${A.esc(u.id)}" type="button">
            <span class="status-toggle-switch"><span></span></span>
            <div><strong>${isActive ? 'Активований' : 'Неактивний'}</strong><small>${isActive ? 'Натисни, щоб деактивувати доступ' : 'Натисни, щоб активувати доступ'}</small></div>
          </button>
          <button class="action-tile danger delete-user-tile" data-action="status" data-value="deleted" data-id="${A.esc(u.id)}" type="button">
            <span class="role-choice-icon">🗑️</span><div><strong>Видалити</strong><small>Позначити обліковий запис як видалений</small></div>
          </button>`;
        showModal();
      }

      function openRoleModal(id){
        const u = state.users.find(x => String(x.id) === String(id)); if (!u) return;
        actionModalKicker.textContent = 'Зміна ролі'; actionModalTitle.textContent = u.marker || 'Користувач';
        actionModalSub.textContent = `${u.email} · поточна роль: ${A.roleLabel(u.role)}`;
        actionModalBody.className = 'action-grid role-picker-grid';
        actionModalBody.innerHTML = Object.entries(ROLE_META).map(([role, meta]) => {
          const current = A.normalizeRole(u.role) === role;
          return `<button class="action-tile role-choice-tile role-choice-card ${current ? 'current-role' : ''}" data-action="role" data-value="${role}" data-id="${A.esc(u.id)}" type="button">
            
            <span class="role-choice-icon"><img src="${meta.icon}" alt=""></span>
            <div><strong>${meta.label}</strong><small>${meta.desc}</small></div>
          </button>`;
        }).join('');
        showModal();
      }

      function showModal(){ actionModal.hidden = false; requestAnimationFrame(() => actionModal.classList.add('open')); }
      function closeActionsModal(){ actionModal.classList.remove('open'); setTimeout(() => { actionModal.hidden = true; actionModalBody.className = 'action-grid'; }, 160); }

      async function updateUser(id, patch){
        const u = state.users.find(x => String(x.id) === String(id)); if (!u) return;
        const byEmail = u.email; const statusPatch = patch.status ? { status: patch.status, is_active: patch.status === 'active' } : {};
        const rolePatch = patch.role ? { role: patch.role } : {}; const dbPatch = {...statusPatch, ...rolePatch, updated_at: new Date().toISOString()};
        setNotice('Застосовую зміни...', ''); let ok = false, lastError = null;
        if (state.profilesAvailable) { const { error } = await supabase.from('rebus_profiles').update(dbPatch).eq('email', byEmail); if (!error) ok = true; else lastError = error; }
        const nextRole = patch.role ? A.normalizeRole(patch.role) : A.normalizeRole(u.role); const isAdminRole = nextRole === 'admin' || nextRole === 'super_admin';
        if (isAdminRole) {
          const adminPatch = { email: byEmail, marker: u.marker, role: nextRole, is_active: patch.status ? patch.status === 'active' : u.status !== 'inactive' && u.status !== 'deleted', mfa_required: true, updated_at: new Date().toISOString() };
          const adminUpdate = await supabase.from('rebus_admin_access').upsert(adminPatch, { onConflict:'email' }); if (!adminUpdate.error) ok = true; else lastError = adminUpdate.error;
        } else {
          const adminUpdate = await supabase.from('rebus_admin_access').update({ role: nextRole, is_active:false, updated_at:new Date().toISOString() }).eq('email', byEmail); if (!adminUpdate.error) ok = true;
        }
        if (!ok) { setNotice(lastError?.message || 'Не вдалося оновити користувача.', 'error'); return; }
        await A.logEvent(supabase, { marker:u.marker, email:u.email, action: patch.role ? `Змінено роль: ${A.roleLabel(patch.role)}` : `Змінено статус: ${patch.status}`, status:'success' });
        if (patch.role) u.role = patch.role; if (patch.status) u.status = patch.status;
        closeActionsModal(); setNotice('Зміни збережено.', 'ok'); render();
      }

      searchInput.addEventListener('input', e => { state.query = e.target.value; state.page=1; render(); });
      document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); state.filter=btn.dataset.filter; state.page=1; render(); }));
      document.querySelectorAll('th.sortable').forEach(th => th.addEventListener('click', () => { const s=th.dataset.sort; state.dir = state.sort === s ? state.dir * -1 : 1; state.sort=s; render(); }));
      prevPage.onclick = () => { state.page=Math.max(1,state.page-1); render(); }; nextPage.onclick = () => { state.page+=1; render(); };
      closeActionModal.onclick = closeActionsModal; actionModal.addEventListener('click', e => { if (e.target === actionModal) closeActionsModal(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape' && !actionModal.hidden) closeActionsModal(); });
      document.addEventListener('click', e => {
        const contourBtn = e.target.closest('[data-open-contours]'); if (contourBtn) { openContourModal(contourBtn.dataset.openContours); return; }
        const removeContourBtn = e.target.closest('[data-remove-contour]'); if (removeContourBtn) { removeUserContour(removeContourBtn.dataset.userId, removeContourBtn.dataset.removeContour); return; }
        const addContourBtn = e.target.closest('[data-add-contour-user]'); if (addContourBtn) { const select = document.querySelector(`[data-add-contour-select="${CSS.escape(addContourBtn.dataset.addContourUser)}"]`); addUserContour(addContourBtn.dataset.addContourUser, select?.value || ''); return; }
        const statusBtn = e.target.closest('[data-open-status]'); if (statusBtn) { openStatusModal(statusBtn.dataset.openStatus); return; }
        const roleBtn = e.target.closest('[data-open-role]'); if (roleBtn) { openRoleModal(roleBtn.dataset.openRole); return; }
        const action = e.target.closest('[data-action]'); if (action) updateUser(action.dataset.id, { [action.dataset.action]: action.dataset.value });
      });
      loadUsers();
    });
  </script>
  <script src="js/logout.js" defer></script>
</body>
</html>

<style>.current-role-badge{display:none!important;}</style>
