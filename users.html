<!doctype html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>REBUS — Користувачі</title>

      <div class="sidebar-footer">
        <button id="logoutBtn" class="logout-btn" type="button">Вийти</button>
      </div>

    </aside><main class="main"><div class="topbar"><h2>Користувачі</h2><div class="user-pill" id="adminEmail"></div></div><section class="panel"><div class="panel-header"><h3>Список доступів</h3></div><table class="table"><thead><tr><th>Маркер</th><th>Email</th><th>Роль</th><th>Статус</th></tr></thead><tbody id="body"><tr><td colspan="4">Завантаження...</td></tr></tbody></table></section></main></div><script>window.addEventListener('DOMContentLoaded', async()=>{const{supabase,requireAdmin,getAal}=window.rebusAuth;const ctx=await requireAdmin();if(!ctx)return;if(await getAal()!=='aal2'){location.href='verify-2fa.html';return}adminEmail.textContent=ctx.session.user.email;const{data}=await supabase.from('rebus_profiles').select('*').order('created_at',{ascending:false});body.innerHTML=(data&&data.length)?data.map(u=>`<tr><td>${u.marker}</td><td>${u.email}</td><td>${u.role}</td><td><span class="tag ${u.is_active?'':'off'}">${u.is_active?'active':'blocked'}</span></td></tr>`).join(''):'<tr><td colspan="4">Користувачів ще немає</td></tr>'})</script>  <script src="js/logout.js" defer></script>
</body></html>
