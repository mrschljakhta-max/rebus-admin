<!doctype html>
<html lang="uk">
<head>
  <title>REBUS — Користувачі</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/favicon.png?v=20260612-nq-actions" />
  <link rel="shortcut icon" type="image/png" href="assets/favicon.png?v=20260612-nq-actions" />
  <link rel="apple-touch-icon" href="assets/favicon.png?v=20260612-nq-actions" />
  <link rel="stylesheet" href="css/styles.css?v=20260624-contours-v1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js" defer></script>
  <script src="js/admin-common.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><img src="assets/favicon.png" alt="REBUS"><h1>REBUS <span>Admin</span></h1></div>
      <nav class="nav">
        <a href="dashboard.html">Головна</a>
        <a class="active" href="users.html">Користувачі</a>
        <a href="access.html">Надати доступ</a>
        <a href="contours.html">Контури</a>
        <a href="events.html">Журнал</a>
      </nav>
      <div class="sidebar-footer"><button id="logoutBtn" class="logout-btn" type="button">Вийти</button></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h2>Користувачі</h2>
        <div class="user-pill" id="adminEmail"></div>
      </div>

      <section class="panel tools-panel">
        <div class="search-row">
          <div class="search-box"><input id="searchInput" class="search-input" placeholder="Пошук по email, маркеру або ролі..."></div>
        </div>
        <div class="filter-row">
          <button class="filter-btn active" data-filter="all">Всі <span id="countAll" class="count-pill">0</span></button>
          <button class="filter-btn" data-filter="active">Активні <span id="countActive" class="count-pill">0</span></button>
          <button class="filter-btn" data-filter="inactive">Неактивні <span id="countInactive" class="count-pill">0</span></button>
          <button class="filter-btn" data-filter="deleted">Видалені <span id="countDeleted" class="count-pill">0</span></button>
        </div>
      </section>

      <section class="panel table-panel">
        <div id="notice"></div>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th class="sortable" data-sort="marker">Маркер ⇅</th>
                <th class="sortable" data-sort="email">Email ⇅</th>
                <th class="sortable" data-sort="role">Роль ⇅</th>
                <th class="sortable" data-sort="contour_name">Контур ⇅</th>
                <th class="sortable" data-sort="status">Статус ⇅</th>
                <th class="sortable" data-sort="last_login">Останній вхід ⇅</th>
                <th class="sortable" data-sort="created_at">Створений ⇅</th>
                <th>Дії</th>
              </tr>
            </thead>
            <tbody id="usersBody"><tr><td colspan="8">Завантаження...</td></tr></tbody>
          </table>
        </div>
        <div class="footer-row">
          <div id="shownCount" class="muted">Показано: 0 користувачів</div>
          <div class="pagination"><button id="prevPage" class="page-btn">‹</button><button id="pageNo" class="page-btn active">1</button><button id="nextPage" class="page-btn">›</button></div>
        </div>
      </section>
    </main>
  </div>

  <div id="userActionModal" class="modal-backdrop rebus-action-modal" hidden>
    <div class="modal action-dialog" role="dialog" aria-modal="true" aria-labelledby="actionModalTitle">
      <div class="modal-head">
        <div>
          <div class="modal-kicker">Керування користувачем</div>
          <h3 id="actionModalTitle">Дії</h3>
          <p id="actionModalSub" class="modal-sub"></p>
        </div>
        <button id="closeActionModal" class="modal-close" type="button">×</button>
      </div>
      <div id="actionModalBody" class="action-grid"></div>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const { supabase } = window.rebusAuth;
      const A = window.rebusAdmin;
      const ctx = await A.getAdminContext(); if (!ctx) return;
      A.renderAdminProfile(document.getElementById('adminEmail'), ctx.session, ctx.admin);

      const state = { users: [], contours: [], memberships: [], filter:'all', query:'', sort:'marker', dir:1, page:1, pageSize:8, profilesAvailable:true, contoursAvailable:true };
      const usersBody = document.getElementById('usersBody');
      const notice = document.getElementById('notice');
      const actionModal = document.getElementById('userActionModal');
      const actionModalTitle = document.getElementById('actionModalTitle');
      const actionModalSub = document.getElementById('actionModalSub');
      const actionModalBody = document.getElementById('actionModalBody');

      function setNotice(text, type='') { notice.innerHTML = text ? `<div class="notice ${type}">${A.esc(text)}</div>` : ''; }

      async function loadUsers(){
        usersBody.innerHTML = '<tr><td colspan="8">Завантаження...</td></tr>';
        setNotice('');
        let rows = [];
        let source = 'profiles';
        const profileResp = await supabase.from('rebus_profiles').select('*').order('created_at', { ascending:false });
        if (!profileResp.error) {
          rows = profileResp.data || [];
        } else {
          state.profilesAvailable = false;
          source = 'admin_access';
          const adminResp = await supabase.from('rebus_admin_access').select('*').order('created_at', { ascending:false });
          if (adminResp.error) {
            usersBody.innerHTML = `<tr><td colspan="8">Помилка завантаження: ${A.esc(adminResp.error.message)}</td></tr>`;
            setNotice(`rebus_profiles недоступна (${profileResp.error.message}). rebus_admin_access також не читається (${adminResp.error.message}).`, 'error');
            return;
          }
          rows = adminResp.data || [];
          setNotice(`Увага: rebus_profiles недоступна (${profileResp.error.message}). Показано резервні дані з rebus_admin_access.`, '');
        }
        state.users = rows.map(r => A.mapUser({...r, source}));
        await loadContours();
        applyContourNames();
        render();
      }

      async function loadContours(){
        const [contoursResp, membersResp] = await Promise.all([
          supabase.from('rebus_contours').select('*').order('name', { ascending:true }),
          supabase.from('rebus_contour_members').select('*')
        ]);
        if (contoursResp.error || membersResp.error) {
          state.contoursAvailable = false;
          state.contours = [];
          state.memberships = [];
          setNotice(`Контури ще не налаштовані в Supabase. Застосуй SQL з файлу supabase-contours.sql. ${contoursResp.error ? contoursResp.error.message : membersResp.error.message}`, '');
          return;
        }
        state.contoursAvailable = true;
        state.contours = contoursResp.data || [];
        state.memberships = membersResp.data || [];
      }

      function applyContourNames(){
        const activeContours = new Map(state.contours.map(c => [String(c.id), c]));
        state.users.forEach(u => {
          const membership = state.memberships.find(m => String(m.user_id || '') === String(u.id) || String(m.email || '').toLowerCase() === String(u.email || '').toLowerCase());
          u.contour_id = membership?.contour_id || '';
          const contour = activeContours.get(String(u.contour_id));
          u.contour_name = contour?.name || 'Без контуру';
        });
      }

      function contourSelect(u){
        const options = ['<option value="">Без контуру</option>'].concat(state.contours.filter(c => c.is_active !== false).map(c => `<option value="${A.esc(c.id)}" ${String(c.id)===String(u.contour_id)?'selected':''}>${A.esc(c.name)}</option>`)).join('');
        const disabled = state.contoursAvailable ? '' : 'disabled';
        return `<select class="contour-select" data-contour-user="${A.esc(u.id)}" ${disabled}>${options}</select>`;
      }

      async function updateUserContour(userId, contourId){
        const u = state.users.find(x => String(x.id) === String(userId));
        if (!u || !state.contoursAvailable) return;
        setNotice('Оновлюю контур користувача...', '');
        const now = new Date().toISOString();
        const existing = state.memberships.filter(m => String(m.user_id || '') === String(u.id) || String(m.email || '').toLowerCase() === String(u.email || '').toLowerCase());
        for (const m of existing) {
          await supabase.from('rebus_contour_members').delete().eq('id', m.id);
        }
        if (contourId) {
          const { error } = await supabase.from('rebus_contour_members').insert({
            contour_id: contourId,
            user_id: u.id,
            email: u.email,
            role: u.role,
            marker: u.marker,
            added_by: ctx.session?.user?.email || null,
            created_at: now
          });
          if (error) { setNotice(error.message || 'Не вдалося призначити контур.', 'error'); return; }
        }
        await A.logEvent(supabase, { marker:u.marker, email:u.email, action: contourId ? `Призначено контур: ${(state.contours.find(c=>String(c.id)===String(contourId))||{}).name || contourId}` : 'Контур знято', status:'success' });
        await loadContours();
        applyContourNames();
        setNotice('Контур користувача оновлено.', 'ok');
        render();
      }

      function filtered(){
        let list = [...state.users];
        if (state.filter !== 'all') list = list.filter(u => u.status === state.filter);
        const q = state.query.trim().toLowerCase();
        if (q) list = list.filter(u => [u.marker,u.email,u.full_name,A.roleLabel(u.role),u.contour_name,u.status].join(' ').toLowerCase().includes(q));
        list.sort((a,b) => {
          const av = a[state.sort] || '';
          const bv = b[state.sort] || '';
          return String(av).localeCompare(String(bv), 'uk', { numeric:true }) * state.dir;
        });
        return list;
      }

      function updateCounts(){
        document.getElementById('countAll').textContent = state.users.length;
        document.getElementById('countActive').textContent = state.users.filter(u=>u.status==='active').length;
        document.getElementById('countInactive').textContent = state.users.filter(u=>u.status==='inactive').length;
        document.getElementById('countDeleted').textContent = state.users.filter(u=>u.status==='deleted').length;
      }

      function render(){
        updateCounts();
        const list = filtered();
        const totalPages = Math.max(1, Math.ceil(list.length / state.pageSize));
        state.page = Math.min(state.page, totalPages);
        const pageItems = list.slice((state.page-1)*state.pageSize, state.page*state.pageSize);
        usersBody.innerHTML = pageItems.length ? pageItems.map(userRow).join('') : '<tr><td colspan="8">Користувачів не знайдено</td></tr>';
        document.getElementById('shownCount').textContent = `Показано: ${pageItems.length ? ((state.page-1)*state.pageSize+1) : 0}-${Math.min(state.page*state.pageSize, list.length)} із ${list.length} користувачів`;
        document.getElementById('pageNo').textContent = state.page;
        document.getElementById('prevPage').disabled = state.page <= 1;
        document.getElementById('nextPage').disabled = state.page >= totalPages;
      }

      function userRow(u){
        const avatar = u.avatar_url ? `<img class="mini-avatar" src="${A.esc(u.avatar_url)}" alt="">` : `<div class="mini-avatar">${A.esc(A.initials(u.full_name,u.email))}</div>`;
        return `<tr data-id="${A.esc(u.id)}">
          <td>${A.esc(u.marker)}</td>
          <td><div class="user-cell">${avatar}<div><div class="email-main">${A.esc(u.email)}</div><div class="email-sub">${A.esc(u.full_name || u.email)}</div></div></div></td>
          <td><span class="role-badge role-${A.esc(u.role)}">${A.esc(A.roleLabel(u.role))}</span></td>
          <td>${contourSelect(u)}</td>
          <td><span class="status-badge status-${A.esc(u.status)}">${A.esc(A.statusLabel(u.status))}</span></td>
          <td>${A.esc(A.fmtDate(u.last_login))}</td>
          <td>${A.esc(A.fmtDate(u.created_at))}</td>
          <td>${actionsMenu(u)}</td>
        </tr>`;
      }

      function actionsMenu(u){
        return `<button class="dots-btn" data-open-actions="${A.esc(u.id)}" type="button" aria-label="Дії користувача">⋮</button>`;
      }

      function openActionsModal(id){
        const u = state.users.find(x => String(x.id) === String(id));
        if (!u) return;
        actionModalTitle.textContent = u.marker || 'Користувач';
        actionModalSub.textContent = `${u.email} · ${A.roleLabel(u.role)} · ${A.statusLabel(u.status)}`;
        actionModalBody.innerHTML = `
          <button class="action-tile" data-action="status" data-value="active" data-id="${A.esc(u.id)}"><span>●</span><div><strong>Активувати</strong><small>Дозволити роботу в системі</small></div></button>
          <button class="action-tile" data-action="status" data-value="inactive" data-id="${A.esc(u.id)}"><span>●</span><div><strong>Деактивувати</strong><small>Тимчасово вимкнути доступ</small></div></button>
          <button class="action-tile" data-action="role" data-value="user" data-id="${A.esc(u.id)}"><span>👤</span><div><strong>Зробити користувачем</strong><small>Роль для базового шифрування</small></div></button>
          <button class="action-tile" data-action="role" data-value="operator" data-id="${A.esc(u.id)}"><span>🛡️</span><div><strong>Зробити оператором</strong><small>Доступ до розшифрування в межах контуру</small></div></button>
          <button class="action-tile" data-action="role" data-value="admin" data-id="${A.esc(u.id)}"><span>👑</span><div><strong>Зробити адміністратором</strong><small>Керування користувачами й контурами</small></div></button>
          <button class="action-tile" data-action="role" data-value="super_admin" data-id="${A.esc(u.id)}"><span>◆</span><div><strong>Зробити суперадміністратором</strong><small>Повні права системи</small></div></button>
          <button class="action-tile danger" data-action="status" data-value="deleted" data-id="${A.esc(u.id)}"><span>🗑️</span><div><strong>Видалити</strong><small>Позначити обліковий запис як видалений</small></div></button>`;
        actionModal.hidden = false;
        requestAnimationFrame(() => actionModal.classList.add('open'));
      }

      function closeActionsModal(){
        actionModal.classList.remove('open');
        setTimeout(() => { actionModal.hidden = true; }, 160);
      }

      async function updateUser(id, patch){
        const u = state.users.find(x => String(x.id) === String(id));
        if (!u) return;
        const byEmail = u.email;
        const statusPatch = patch.status ? { status: patch.status, is_active: patch.status === 'active' } : {};
        const rolePatch = patch.role ? { role: patch.role } : {};
        const dbPatch = {...statusPatch, ...rolePatch, updated_at: new Date().toISOString()};
        setNotice('Застосовую зміни...', '');
        let ok = false, lastError = null;
        if (state.profilesAvailable) {
          const { error } = await supabase.from('rebus_profiles').update(dbPatch).eq('email', byEmail);
          if (!error) ok = true; else lastError = error;
        }
        const nextRole = patch.role ? A.normalizeRole(patch.role) : A.normalizeRole(u.role);
        const isAdminRole = nextRole === 'admin' || nextRole === 'super_admin';
        if (isAdminRole) {
          const adminPatch = {
            email: byEmail,
            marker: u.marker,
            role: nextRole,
            is_active: patch.status ? patch.status === 'active' : u.status !== 'inactive' && u.status !== 'deleted',
            mfa_required: true,
            updated_at: new Date().toISOString()
          };
          const adminUpdate = await supabase.from('rebus_admin_access').upsert(adminPatch, { onConflict:'email' });
          if (!adminUpdate.error) ok = true; else lastError = adminUpdate.error;
        } else {
          const adminUpdate = await supabase.from('rebus_admin_access')
            .update({ role: nextRole, is_active:false, updated_at:new Date().toISOString() })
            .eq('email', byEmail);
          if (!adminUpdate.error) ok = true;
        }
        if (!ok) { setNotice(lastError?.message || 'Не вдалося оновити користувача.', 'error'); return; }
        await A.logEvent(supabase, { marker:u.marker, email:u.email, action: patch.role ? `Змінено роль: ${A.roleLabel(patch.role)}` : `Змінено статус: ${patch.status}`, status:'success' });
        if (patch.role) u.role = patch.role;
        if (patch.status) u.status = patch.status;
        closeActionsModal();
        setNotice('Зміни збережено.', 'ok');
        render();
      }

      document.getElementById('searchInput').addEventListener('input', e => { state.query = e.target.value; state.page=1; render(); });
      document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); state.filter=btn.dataset.filter; state.page=1; render(); }));
      document.querySelectorAll('th.sortable').forEach(th => th.addEventListener('click', () => { const s=th.dataset.sort; state.dir = state.sort === s ? state.dir * -1 : 1; state.sort=s; render(); }));
      document.getElementById('prevPage').onclick = () => { state.page=Math.max(1,state.page-1); render(); };
      document.getElementById('nextPage').onclick = () => { state.page+=1; render(); };
      document.getElementById('closeActionModal').onclick = closeActionsModal;
      actionModal.addEventListener('click', e => { if (e.target === actionModal) closeActionsModal(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape' && !actionModal.hidden) closeActionsModal(); });
      document.addEventListener('change', e => {
        const select = e.target.closest('[data-contour-user]');
        if (select) updateUserContour(select.dataset.contourUser, select.value);
      });
      document.addEventListener('click', e => {
        const menuBtn = e.target.closest('[data-open-actions]');
        if (menuBtn) { openActionsModal(menuBtn.dataset.openActions); return; }
        const action = e.target.closest('[data-action]');
        if (action) updateUser(action.dataset.id, { [action.dataset.action]: action.dataset.value });
      });
      loadUsers();
    });
  </script>
  <script src="js/logout.js" defer></script>
</body>
</html>
