<!doctype html>
<html lang="uk">
<head>
  <title>REBUS — Користувачі</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/favicon.png?v=20260612-users-v2" />
  <link rel="shortcut icon" type="image/png" href="assets/favicon.png?v=20260612-users-v2" />
  <link rel="apple-touch-icon" href="assets/favicon.png?v=20260612-users-v2" />
  <link rel="stylesheet" href="css/styles.css?v=20260612-users-v2" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js" defer></script>
  <script src="js/admin-users.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><img src="assets/favicon.png" alt="REBUS"><h1>REBUS <span>Admin</span></h1></div>
      <nav class="nav">
        <a href="dashboard.html">Головна</a>
        <a class="active" href="users.html">Користувачі</a>
        <a href="access.html">Надати доступ</a>
        <a href="events.html">Журнал</a>
      </nav>
      <div class="sidebar-footer">
        <button id="logoutBtn" class="logout-btn" type="button">Вийти</button>
      </div>
    </aside>

    <main class="main users-page-main">
      <div class="topbar users-topbar">
        <h2>Користувачі</h2>
        <div class="account-card">
          <div class="account-avatar" id="currentAvatar">A</div>
          <div class="account-meta">
            <strong id="currentName">Адміністратор</strong>
            <span id="currentEmail">—</span>
            <em id="currentRole">Адміністратор</em>
          </div>
        </div>
      </div>

      <section class="users-toolbar panel-flat">
        <div class="search-box">
          <span>⌕</span>
          <input id="usersSearch" type="search" placeholder="Пошук по email, маркеру або ролі..." autocomplete="off">
        </div>
        <div class="filter-row" aria-label="Фільтри статусу">
          <button class="filter-chip active" type="button" data-filter="all">Всі <b class="filter-count">0</b></button>
          <button class="filter-chip" type="button" data-filter="active">Активні <b class="filter-count">0</b></button>
          <button class="filter-chip" type="button" data-filter="inactive">Неактивні <b class="filter-count">0</b></button>
          <button class="filter-chip" type="button" data-filter="deleted">Видалені <b class="filter-count">0</b></button>
        </div>
      </section>

      <section class="panel users-table-panel">
        <div id="usersWarning" class="inline-warning" hidden></div>
        <table class="table users-table">
          <thead>
            <tr>
              <th><button type="button" class="sort-btn" data-sort="marker">Маркер ⇅</button></th>
              <th><button type="button" class="sort-btn" data-sort="email">Email ⇅</button></th>
              <th><button type="button" class="sort-btn" data-sort="role">Роль ⇅</button></th>
              <th><button type="button" class="sort-btn" data-sort="status">Статус ⇅</button></th>
              <th><button type="button" class="sort-btn" data-sort="last_login">Останній вхід ⇅</button></th>
              <th><button type="button" class="sort-btn" data-sort="created_at">Створений ⇅</button></th>
              <th>Дії</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="7" class="table-empty">Завантаження...</td></tr>
          </tbody>
        </table>
        <div class="table-footer">
          <div>
            <span id="usersSummary">Показано: 0 користувачів</span>
            <div id="usersStatus" class="status compact-status"></div>
          </div>
          <div id="usersPagination" class="pagination"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => window.initUsersPage && window.initUsersPage());
  </script>
  <script src="js/logout.js" defer></script>
</body>
</html>
