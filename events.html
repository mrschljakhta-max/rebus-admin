<!doctype html>
<html lang="uk">
<head>
  <title>REBUS — Журнал</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/favicon.png?v=20260612-nq-events-v2" />
  <link rel="shortcut icon" type="image/png" href="assets/favicon.png?v=20260612-nq-events-v2" />
  <link rel="apple-touch-icon" href="assets/favicon.png?v=20260612-nq-events-v2" />
  <link rel="stylesheet" href="css/styles.css?v=20260612-events-v2" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js" defer></script>
  <script src="js/admin-common.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><img src="assets/favicon.png" alt="REBUS"><h1>REBUS <span>Admin</span></h1></div>
      <nav class="nav"><a href="dashboard.html">Головна</a><a href="users.html">Користувачі</a><a href="access.html">Надати доступ</a><a href="contours.html">Контури</a><a class="active" href="events.html">Журнал</a></nav>
      <div class="sidebar-footer"><button id="logoutBtn" class="logout-btn" type="button">Вийти</button></div>
    </aside>
    <main class="main">
      <div class="topbar"><h2>Журнал подій</h2><div class="user-pill" id="adminEmail"></div></div>
      <section class="panel tools-panel">
        <div class="search-row">
          <div class="search-box"><input id="eventSearch" class="search-input" placeholder="Пошук по email, маркеру або дії..."></div>
          <button id="reloadEvents" class="small-btn">Оновити</button>
        </div>
        <div class="filter-row">
          <button class="filter-btn active" data-event-filter="all">Усі <span class="count-pill" id="eventAll">0</span></button>
          <button class="filter-btn" data-event-filter="success">Успішні <span class="count-pill" id="eventSuccess">0</span></button>
          <button class="filter-btn" data-event-filter="error">Помилки <span class="count-pill" id="eventError">0</span></button>
        </div>
      </section>
      <section class="panel table-panel">
        <div class="panel-header"><h3>Останні події</h3></div>
        <div id="notice"></div>
        <div class="table-wrap"><table class="table"><thead><tr><th>Дата</th><th>Маркер</th><th>Email</th><th>Дія</th><th>Файл</th><th>Статус</th></tr></thead><tbody id="eventsBody"><tr><td colspan="6">Завантаження...</td></tr></tbody></table></div>
      </section>
    </main>
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const { supabase } = window.rebusAuth; const A = window.rebusAdmin;
      const ctx = await A.getAdminContext(); if(!ctx)return;
      A.renderAdminProfile(document.getElementById('adminEmail'), ctx.session, ctx.admin);
      const body = document.getElementById('eventsBody'); const notice = document.getElementById('notice');
      const state = { rows: [], filter: 'all', query: '' };
      function statusOf(e){ return String(e.status || 'success').toLowerCase() === 'error' ? 'error' : 'success'; }
      function updateCounts(){
        document.getElementById('eventAll').textContent = state.rows.length;
        document.getElementById('eventSuccess').textContent = state.rows.filter(e=>statusOf(e)==='success').length;
        document.getElementById('eventError').textContent = state.rows.filter(e=>statusOf(e)==='error').length;
      }
      function filtered(){
        const q = state.query.trim().toLowerCase();
        return state.rows.filter(e => {
          if(state.filter !== 'all' && statusOf(e) !== state.filter) return false;
          if(!q) return true;
          return [e.marker,e.email,e.action,e.file_name,e.status].some(v => String(v||'').toLowerCase().includes(q));
        });
      }
      function render(){
        updateCounts();
        const rows = filtered();
        body.innerHTML = rows.length ? rows.map(e => `<tr><td>${A.esc(A.fmtDate(e.created_at))}</td><td>${A.esc(e.marker||'—')}</td><td>${A.esc(e.email||'—')}</td><td>${A.esc(e.action||'—')}</td><td>${A.esc(e.file_name||'—')}</td><td><span class="tag ${statusOf(e)==='error'?'off':''}">${A.esc(e.status||'success')}</span></td></tr>`).join('') : '<tr><td colspan="6">Подій не знайдено</td></tr>';
      }
      async function loadEvents(){
        body.innerHTML = '<tr><td colspan="6">Завантаження...</td></tr>'; notice.innerHTML='';
        let rows = [];
        const logs = await supabase.from('activity_logs').select('*').order('created_at',{ascending:false}).limit(100);
        if(!logs.error) rows = logs.data || [];
        else {
          const ev = await supabase.from('rebus_events').select('*').order('created_at',{ascending:false}).limit(100);
          if(ev.error){ body.innerHTML = `<tr><td colspan="6">Помилка завантаження: ${A.esc(ev.error.message)}</td></tr>`; notice.innerHTML=`<div class="notice error">activity_logs: ${A.esc(logs.error.message)}; rebus_events: ${A.esc(ev.error.message)}</div>`; state.rows=[]; updateCounts(); return; }
          rows = ev.data || []; notice.innerHTML=`<div class="notice">activity_logs недоступна (${A.esc(logs.error.message)}). Показано резервні дані з rebus_events.</div>`;
        }
        state.rows = rows;
        render();
      }
      document.getElementById('eventSearch').addEventListener('input', e => { state.query = e.target.value; render(); });
      document.querySelectorAll('[data-event-filter]').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('[data-event-filter]').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); state.filter = btn.dataset.eventFilter; render(); }));
      document.getElementById('reloadEvents').onclick = loadEvents;
      loadEvents();
    });
  </script>
  <script src="js/logout.js" defer></script>
</body>
</html>
