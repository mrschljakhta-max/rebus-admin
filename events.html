<!doctype html>
<html lang="uk">
<head>
  <title>REBUS — Журнал</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/favicon.png?v=20260612-nq-actions" />
  <link rel="shortcut icon" type="image/png" href="assets/favicon.png?v=20260612-nq-actions" />
  <link rel="apple-touch-icon" href="assets/favicon.png?v=20260612-nq-actions" />
  <link rel="stylesheet" href="css/styles.css?v=20260612-users-actions" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js" defer></script>
  <script src="js/admin-common.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><img src="assets/favicon.png" alt="REBUS"><h1>REBUS <span>Admin</span></h1></div>
      <nav class="nav"><a href="dashboard.html">Головна</a><a href="users.html">Користувачі</a><a href="access.html">Надати доступ</a><a class="active" href="events.html">Журнал</a></nav>
      <div class="sidebar-footer"><button id="logoutBtn" class="logout-btn" type="button">Вийти</button></div>
    </aside>
    <main class="main">
      <div class="topbar"><h2>Журнал подій</h2><div class="user-pill" id="adminEmail"></div></div>
      <section class="panel">
        <div class="panel-header"><h3>Останні події</h3></div>
        <div id="notice"></div>
        <table class="table"><thead><tr><th>Дата</th><th>Маркер</th><th>Email</th><th>Дія</th><th>Файл</th><th>Статус</th></tr></thead><tbody id="eventsBody"><tr><td colspan="6">Завантаження...</td></tr></tbody></table>
      </section>
    </main>
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const { supabase } = window.rebusAuth; const A = window.rebusAdmin;
      const ctx = await A.getAdminContext(); if(!ctx)return;
      A.renderAdminProfile(document.getElementById('adminEmail'), ctx.session, ctx.admin);
      const body = document.getElementById('eventsBody'); const notice = document.getElementById('notice');
      let rows = [];
      const logs = await supabase.from('activity_logs').select('*').order('created_at',{ascending:false}).limit(50);
      if(!logs.error) rows = logs.data || [];
      else {
        const ev = await supabase.from('rebus_events').select('*').order('created_at',{ascending:false}).limit(50);
        if(ev.error){ body.innerHTML = `<tr><td colspan="6">Помилка завантаження: ${A.esc(ev.error.message)}</td></tr>`; notice.innerHTML=`<div class="notice error">activity_logs: ${A.esc(logs.error.message)}; rebus_events: ${A.esc(ev.error.message)}</div>`; return; }
        rows = ev.data || []; notice.innerHTML=`<div class="notice">activity_logs недоступна (${A.esc(logs.error.message)}). Показано резервні дані з rebus_events.</div>`;
      }
      body.innerHTML = rows.length ? rows.map(e => `<tr><td>${A.esc(A.fmtDate(e.created_at))}</td><td>${A.esc(e.marker||'—')}</td><td>${A.esc(e.email||'—')}</td><td>${A.esc(e.action||'—')}</td><td>${A.esc(e.file_name||'—')}</td><td><span class="tag ${e.status==='error'?'off':''}">${A.esc(e.status||'success')}</span></td></tr>`).join('') : '<tr><td colspan="6">Подій ще немає</td></tr>';
    });
  </script>
  <script src="js/logout.js" defer></script>
</body>
</html>
