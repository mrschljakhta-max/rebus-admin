<!doctype html>
<html lang="uk">
<head>
  <title>REBUS — Надати доступ</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/favicon.png?v=20260612-nq-access-workflow-v3" />
  <link rel="shortcut icon" type="image/png" href="assets/favicon.png?v=20260612-nq-access-workflow-v3" />
  <link rel="apple-touch-icon" href="assets/favicon.png?v=20260612-nq-access-workflow-v3" />
  <link rel="stylesheet" href="css/styles.css?v=20260612-access-workflow-v3" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js" defer></script>
  <script src="js/admin-common.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><img src="assets/favicon.png" alt="REBUS"><h1>REBUS <span>Admin</span></h1></div>
      <nav class="nav"><a href="dashboard.html">Головна</a><a href="users.html">Користувачі</a><a class="active" href="access.html">Надати доступ</a><a href="events.html">Журнал</a></nav>
      <div class="sidebar-footer"><button id="logoutBtn" class="logout-btn" type="button">Вийти</button></div>
    </aside>
    <main class="main">
      <div class="topbar"><h2>Надати доступ</h2><div class="user-pill" id="adminEmail"></div></div>

      <div class="access-mode-switch" role="tablist" aria-label="Режим сторінки надання доступу">
        <button id="modeRequests" class="mode-tab active" type="button" data-access-mode="requests" aria-selected="true">Запити на доступ</button>
        <button id="modeManual" class="mode-tab" type="button" data-access-mode="manual" aria-selected="false">Ручне надання</button>
      </div>

      <section id="requestsPanel" class="panel access-mode-panel">
        <div class="panel-header">
          <h3>Запити на доступ</h3>
          <button id="reloadRequests" class="small-btn">Оновити</button>
        </div>
        <div class="form-card-body compact">
          <div class="search-row">
            <div class="search-box"><input id="requestSearch" class="search-input" placeholder="Пошук по email, імені або повідомленню..."></div>
          </div>
          <div class="filter-row access-filters">
            <button class="filter-btn active" data-request-filter="pending">Нові <span class="count-pill" id="reqPending">0</span></button>
            <button class="filter-btn" data-request-filter="approved">Схвалені <span class="count-pill" id="reqApproved">0</span></button>
            <button class="filter-btn" data-request-filter="denied">Відхилені <span class="count-pill" id="reqDenied">0</span></button>
            <button class="filter-btn" data-request-filter="all">Всі <span class="count-pill" id="reqAll">0</span></button>
          </div>
        </div>
        <div id="requestsNotice"></div>
        <div class="form-card-body"><div id="requestsList" class="requests-grid"><div class="muted">Завантаження...</div></div></div>
      </section>

      <section id="manualPanel" class="panel access-mode-panel is-hidden">
        <div class="panel-header"><h3>Ручне надання доступу</h3></div>
        <div class="form-card-body">
          <div class="form-grid">
            <div class="field"><label>Email</label><input id="email" placeholder="user@gmail.com"></div>
            <div class="field"><label>Маркер</label><input id="marker" placeholder="RREB-01"></div>
            <div class="field"><label>Ім'я</label><input id="fullName" placeholder="необов'язково"></div>
            <div class="field"><label>Роль</label><select id="role"><option value="user">Користувач</option><option value="operator">Оператор</option><option value="admin">Адміністратор</option><option value="super_admin">Суперадміністратор</option></select></div>
          </div>
          <div class="actions"><button id="createBtn" class="btn">Надати доступ</button></div>
          <div id="status" class="status"></div>
        </div>
      </section>
    </main>
  </div>

  <div id="approveModal" class="modal-backdrop">
    <div class="modal">
      <h3>Схвалити запит</h3>
      <p id="modalEmail" class="muted"></p>
      <div class="form-grid">
        <div class="field"><label>Маркер</label><input id="modalMarker" placeholder="RREB-01"></div>
        <div class="field"><label>Роль</label><select id="modalRole"><option value="user">Користувач</option><option value="operator">Оператор</option><option value="admin">Адміністратор</option><option value="super_admin">Суперадміністратор</option></select></div>
      </div>
      <div class="modal-actions"><button id="cancelApprove" class="small-btn">Скасувати</button><button id="confirmApprove" class="small-btn primary">Схвалити</button></div>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const { supabase, setStatus } = window.rebusAuth;
      const A = window.rebusAdmin;
      const ctx = await A.getAdminContext(); if(!ctx)return;
      A.renderAdminProfile(document.getElementById('adminEmail'), ctx.session, ctx.admin);


      const accessModeButtons = document.querySelectorAll('[data-access-mode]');
      const requestsPanel = document.getElementById('requestsPanel');
      const manualPanel = document.getElementById('manualPanel');
      function setAccessMode(mode){
        const isManual = mode === 'manual';
        requestsPanel.classList.toggle('is-hidden', isManual);
        manualPanel.classList.toggle('is-hidden', !isManual);
        accessModeButtons.forEach(btn => {
          const active = btn.dataset.accessMode === mode;
          btn.classList.toggle('active', active);
          btn.setAttribute('aria-selected', active ? 'true' : 'false');
        });
      }
      accessModeButtons.forEach(btn => btn.addEventListener('click', () => setAccessMode(btn.dataset.accessMode)));
      setAccessMode('requests');

      const requestsList = document.getElementById('requestsList');
      const requestsNotice = document.getElementById('requestsNotice');
      const requestSearch = document.getElementById('requestSearch');
      const state = { requests: [], filter: 'pending', query: '' };
      let selectedRequest = null;

      function notice(text,type=''){
        requestsNotice.innerHTML = text ? `<div class="notice ${type}">${A.esc(text)}</div>` : '';
      }
      function reqStatus(r){ const s = String(r?.status || 'pending').toLowerCase(); return s === 'new' ? 'pending' : (s === 'rejected' ? 'denied' : s); }
      function reqStatusLabel(s){ return {pending:'Очікує', approved:'Схвалено', denied:'Відхилено'}[s] || 'Очікує'; }
      function updateRequestCounts(){
        const all = state.requests;
        document.getElementById('reqAll').textContent = all.length;
        document.getElementById('reqPending').textContent = all.filter(r=>reqStatus(r)==='pending').length;
        document.getElementById('reqApproved').textContent = all.filter(r=>reqStatus(r)==='approved').length;
        document.getElementById('reqDenied').textContent = all.filter(r=>reqStatus(r)==='denied').length;
      }
      function filteredRequests(){
        const q = state.query.trim().toLowerCase();
        return state.requests.filter(r => {
          const s = reqStatus(r);
          if(state.filter !== 'all' && s !== state.filter) return false;
          if(!q) return true;
          return [r.email, r.full_name, r.name, r.message].some(v => String(v||'').toLowerCase().includes(q));
        });
      }
      function renderRequests(){
        updateRequestCounts();
        const list = filteredRequests();
        if(!list.length){ requestsList.innerHTML = `<div class="muted">${state.filter === 'pending' ? 'Нових запитів немає' : 'Запитів не знайдено'}</div>`; return; }
        requestsList.innerHTML = list.map(r => {
          const s = reqStatus(r);
          const actionHtml = s === 'pending'
            ? `<button class="small-btn primary" data-approve="${A.esc(r.id)}">Схвалити</button><button class="small-btn danger" data-deny="${A.esc(r.id)}">Відхилити</button>`
            : `<span class="status-badge status-${s === 'approved' ? 'active' : 'deleted'}">${A.esc(reqStatusLabel(s))}</span>`;
          return `<div class="request-card" data-id="${A.esc(r.id)}">
            <div>
              <div class="email-main">${A.esc(r.email || '—')}</div>
              <div class="request-meta">${A.esc(r.full_name || r.name || 'Без імені')} · ${A.esc(A.fmtDate(r.created_at))}</div>
              <div class="request-meta">${A.esc(r.message || 'Повідомлення відсутнє')}</div>
            </div>
            <div class="request-actions">${actionHtml}</div>
          </div>`;
        }).join('');
      }

      async function grantAccess(payload){
        const now = new Date().toISOString();
        const base = {
          email: payload.email,
          marker: payload.marker,
          full_name: payload.full_name || null,
          role: payload.role || 'user',
          status: 'active',
          is_active: true,
          updated_at: now
        };
        let ok = false, lastError = null;
        const profilePayload = { ...base, created_at: now };
        const prof = await supabase.from('rebus_profiles').upsert(profilePayload, { onConflict:'email' });
        if(!prof.error) ok = true; else lastError = prof.error;

        const normalizedRole = A.normalizeRole(base.role);
        const isAdminRole = normalizedRole === 'admin' || normalizedRole === 'super_admin';

        if (isAdminRole) {
          const adminPayload = { email:base.email, marker:base.marker, role:normalizedRole, is_active:true, mfa_required:true, created_at:now, updated_at:now };
          const admin = await supabase.from('rebus_admin_access').upsert(adminPayload, { onConflict:'email' });
          if(!admin.error) ok = true; else lastError = admin.error;
        } else {
          // Користувач і оператор не повинні мати доступ до адмін-сайту.
          // Якщо раніше цей email був у rebus_admin_access — деактивуємо його там.
          try {
            await supabase.from('rebus_admin_access')
              .update({ is_active:false, role:normalizedRole, updated_at:now })
              .eq('email', base.email);
          } catch(_) {}
        }

        if(!ok) throw lastError || new Error('Не вдалося створити доступ.');
        await A.logEvent(supabase, { marker:base.marker, email:base.email, action:`Надано доступ (${A.roleLabel(base.role)})`, status:'success' });
        // Якщо для цього email була заявка — автоматично позначаємо її як схвалену.
        try {
          await supabase.from('access_requests')
            .update({status:'approved', marker:base.marker, role:base.role, updated_at:new Date().toISOString()})
            .eq('email', base.email)
            .in('status', ['pending', 'new']);
        } catch(_) {}
      }

      async function loadRequests(){
        requestsList.innerHTML = '<div class="muted">Завантаження...</div>'; notice('');
        const { data, error } = await supabase.from('access_requests').select('*').order('created_at',{ascending:false});
        if(error){
          state.requests = [];
          renderRequests();
          notice(`access_requests недоступна (${error.message}). Ручне надання доступу нижче працює окремо.`, '');
          return;
        }
        state.requests = data || [];
        renderRequests();
      }

      function openApprove(id){
        selectedRequest = state.requests.find(r => String(r.id) === String(id)); if(!selectedRequest)return;
        document.getElementById('modalEmail').textContent = selectedRequest.email || '';
        document.getElementById('modalMarker').value = selectedRequest.marker || '';
        document.getElementById('modalRole').value = selectedRequest.role || 'user';
        document.getElementById('approveModal').classList.add('open');
      }
      function closeApprove(){ document.getElementById('approveModal').classList.remove('open'); selectedRequest=null; }

      document.getElementById('createBtn').onclick = async () => {
        const payload = { email:email.value.trim(), marker:marker.value.trim(), full_name:fullName.value.trim(), role:role.value };
        if(!payload.email || !payload.marker){ setStatus('Email і маркер обов’язкові.', 'error'); return; }
        try { setStatus('Створюю доступ...'); await grantAccess(payload); setStatus('Доступ надано.', 'ok'); email.value=''; marker.value=''; fullName.value=''; role.value='user'; }
        catch(e){ setStatus(e?.message || 'Помилка створення доступу.', 'error'); }
      };
      document.getElementById('reloadRequests').onclick = loadRequests;
      document.getElementById('cancelApprove').onclick = closeApprove;
      document.getElementById('confirmApprove').onclick = async () => {
        if(!selectedRequest)return;
        const payload = { email:selectedRequest.email, full_name:selectedRequest.full_name || selectedRequest.name, marker:document.getElementById('modalMarker').value.trim(), role:document.getElementById('modalRole').value };
        if(!payload.marker){ alert('Потрібен маркер.'); return; }
        try {
          await grantAccess(payload);
          await supabase.from('access_requests').update({status:'approved', marker: payload.marker, role: payload.role, updated_at:new Date().toISOString()}).eq('id', selectedRequest.id);
          await A.logEvent(supabase,{marker:payload.marker,email:payload.email,action:'Схвалено запит на доступ',status:'success'});
          closeApprove(); loadRequests();
        } catch(e){ alert(e?.message || 'Не вдалося схвалити запит.'); }
      };
      requestSearch.addEventListener('input', e => { state.query = e.target.value; renderRequests(); });
      document.querySelectorAll('[data-request-filter]').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('[data-request-filter]').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        state.filter = btn.dataset.requestFilter;
        renderRequests();
      }));
      document.addEventListener('click', async e => {
        const approve = e.target.closest('[data-approve]'); if(approve){ openApprove(approve.dataset.approve); return; }
        const deny = e.target.closest('[data-deny]');
        if(deny){
          const r = state.requests.find(x => String(x.id) === String(deny.dataset.deny));
          if(!confirm(`Відхилити запит ${r?.email || ''}?`)) return;
          const { error } = await supabase.from('access_requests').update({status:'denied', updated_at:new Date().toISOString()}).eq('id', deny.dataset.deny);
          if(error){ notice(`Не вдалося відхилити запит: ${error.message}`, 'error'); return; }
          await A.logEvent(supabase,{email:r?.email || '—',marker:r?.marker || '—',action:'Відхилено запит на доступ',status:'success'});
          loadRequests();
        }
      });
      loadRequests();
    });
  </script>
  <script src="js/logout.js" defer></script>
</body>
</html>
