<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REBUS Admin — Dashboard</title>
  <link rel="icon" type="image/png" sizes="192x192" href="./favicon.png?v=20260612-red-r" />
  <link rel="icon" type="image/x-icon" href="./favicon.ico?v=20260612-red-r" />
  <link rel="shortcut icon" type="image/x-icon" href="./favicon.ico?v=20260612-red-r" />
  <link rel="apple-touch-icon" href="./favicon.png?v=20260612-red-r" />
  <link rel="stylesheet" href="css/styles.css?v=20260612-red-2fa" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><img src="assets/key.png" alt="REBUS"><h1>REBUS <span>Admin</span></h1></div>
      <nav class="nav">
        <a class="active" href="dashboard.html">Головна</a>
        <a href="users.html">Користувачі</a>
        <a href="access.html">Надати доступ</a>
        <a href="events.html">Журнал</a>
        <a href="settings.html">Налаштування</a>
      </nav>
    
      <div class="sidebar-footer">
        <button id="logoutBtn" class="logout-btn" type="button">Вийти</button>
      </div>

    </aside>
    <main class="main">
      <div class="topbar"><h2>Центр управління REBUS</h2><div class="user-pill" id="adminEmail"></div></div>
      <section class="cards">
        <div class="card"><div id="usersCount" class="num">—</div><div class="label">Користувачів</div></div>
        <div class="card"><div id="activeCount" class="num">—</div><div class="label">Активних</div></div>
        <div class="card"><div id="adminsCount" class="num">—</div><div class="label">Адмінів</div></div>
        <div class="card"><div id="eventsCount" class="num">—</div><div class="label">Подій</div></div>
      </section>
      <section class="panel">
        <div class="panel-header"><h3>Останні події</h3></div>
        <table class="table"><thead><tr><th>Маркер</th><th>Дія</th><th>Файл</th><th>Статус</th></tr></thead><tbody id="eventsBody"><tr><td colspan="4">Завантаження...</td></tr></tbody></table>
      </section>
    </main>
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const { supabase, requireAdmin, getAal } = window.rebusAuth;
      const ctx = await requireAdmin(); if (!ctx) return;
      if (await getAal() !== 'aal2') { location.href='verify-2fa.html'; return; }
      document.getElementById('adminEmail').textContent = ctx.session.user.email;
      const { data: profiles } = await supabase.from('rebus_profiles').select('*');
      const { data: adminAccess } = await supabase.from('rebus_admin_access').select('*');
      const { data: events } = await supabase.from('rebus_events').select('*').order('created_at', { ascending:false }).limit(8);
      document.getElementById('usersCount').textContent = profiles?.length ?? 0;
      document.getElementById('activeCount').textContent = profiles?.filter(x=>x.is_active).length ?? 0;
      document.getElementById('adminsCount').textContent = adminAccess?.filter(x=>x.is_active).length ?? 0;
      document.getElementById('eventsCount').textContent = events?.length ?? 0;
      const body = document.getElementById('eventsBody');
      body.innerHTML = (events && events.length) ? events.map(e=>`<tr><td>${e.marker||'—'}</td><td>${e.action}</td><td>${e.file_name||'—'}</td><td><span class="tag ${e.status==='success'?'':'off'}">${e.status}</span></td></tr>`).join('') : '<tr><td colspan="4">Подій ще немає</td></tr>';
    });
  </script>
  <script src="js/logout.js" defer></script>
</body>
</html>
