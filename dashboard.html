<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REBUS Admin — Dashboard</title>
  <link rel="icon" type="image/png" href="assets/favicon.png?v=20260612-nq-actions" />
  <link rel="shortcut icon" type="image/png" href="assets/favicon.png?v=20260612-nq-actions" />
  <link rel="apple-touch-icon" href="assets/favicon.png?v=20260612-nq-actions" />
  <link rel="stylesheet" href="css/styles.css?v=20260612-users-actions" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js" defer></script>
  <script src="js/admin-common.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><img src="assets/favicon.png" alt="REBUS"><h1>REBUS <span>Admin</span></h1></div>
      <nav class="nav"><a class="active" href="dashboard.html">Головна</a><a href="users.html">Користувачі</a><a href="access.html">Надати доступ</a><a href="contours.html">Контури</a><a href="events.html">Журнал</a></nav>
      <div class="sidebar-footer"><button id="logoutBtn" class="logout-btn" type="button">Вийти</button></div>
    </aside>
    <main class="main">
      <div class="topbar"><h2>Центр управління REBUS</h2><div class="user-pill" id="adminEmail"></div></div>
      <section class="cards">
        <div class="card"><div id="usersCount" class="num">—</div><div class="label">Користувачів</div></div>
        <div class="card"><div id="activeCount" class="num">—</div><div class="label">Активних</div></div>
        <div class="card"><div id="adminsCount" class="num">—</div><div class="label">Адмінів</div></div>
        <div class="card"><div id="eventsCount" class="num">—</div><div class="label">Подій</div></div>
      </section>
      <section class="panel">
        <div class="panel-header"><h3>Останні події</h3></div>
        <div id="dashboardNotice"></div>
        <table class="table"><thead><tr><th>Маркер</th><th>Email</th><th>Дія</th><th>Дата</th><th>Статус</th></tr></thead><tbody id="eventsBody"><tr><td colspan="5">Завантаження...</td></tr></tbody></table>
      </section>
    </main>
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const { supabase } = window.rebusAuth;
      const A = window.rebusAdmin;
      const ctx = await A.getAdminContext(); if (!ctx) return;
      A.renderAdminProfile(document.getElementById('adminEmail'), ctx.session, ctx.admin);
      const notice = document.getElementById('dashboardNotice');
      let profiles = [], profileErr = null;
      const profileResp = await supabase.from('rebus_profiles').select('*');
      if (!profileResp.error) profiles = profileResp.data || []; else profileErr = profileResp.error;
      if (profileErr) {
        const adminResp = await supabase.from('rebus_admin_access').select('*');
        profiles = (adminResp.data || []).map(x => ({...x, source:'admin_access'}));
        notice.innerHTML = `<div class="notice">rebus_profiles недоступна (${A.esc(profileErr.message)}). Лічильники побудовано за rebus_admin_access.</div>`;
      }
      const mapped = profiles.map(A.mapUser);
      let events = [];
      const logResp = await supabase.from('activity_logs').select('*').order('created_at', { ascending:false }).limit(8);
      if (!logResp.error) events = logResp.data || [];
      else {
        const evResp = await supabase.from('rebus_events').select('*').order('created_at', { ascending:false }).limit(8);
        events = evResp.data || [];
      }
      document.getElementById('usersCount').textContent = mapped.length;
      document.getElementById('activeCount').textContent = mapped.filter(x=>x.status==='active').length;
      document.getElementById('adminsCount').textContent = mapped.filter(x=>x.role==='admin'||x.role==='super_admin').length || 1;
      document.getElementById('eventsCount').textContent = events.length;
      const body = document.getElementById('eventsBody');
      body.innerHTML = events.length ? events.map(e => `<tr><td>${A.esc(e.marker||'—')}</td><td>${A.esc(e.email||'—')}</td><td>${A.esc(e.action||'—')}</td><td>${A.esc(A.fmtDate(e.created_at))}</td><td><span class="tag ${e.status==='error'?'off':''}">${A.esc(e.status||'success')}</span></td></tr>`).join('') : '<tr><td colspan="5">Подій ще немає</td></tr>';
    });
  </script>
  <script src="js/logout.js" defer></script>
</body>
</html>
