<!doctype html>
<html lang="uk">
<head>
  <title>REBUS — Контури доступу</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/favicon.png?v=20260624-contours-v1" />
  <link rel="shortcut icon" type="image/png" href="assets/favicon.png?v=20260624-contours-v1" />
  <link rel="apple-touch-icon" href="assets/favicon.png?v=20260624-contours-v1" />
  <link rel="stylesheet" href="css/styles.css?v=20260624-contours-v1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js" defer></script>
  <script src="js/admin-common.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><img src="assets/favicon.png" alt="REBUS"><h1>REBUS <span>Admin</span></h1></div>
      <nav class="nav"><a href="dashboard.html">Головна</a><a href="users.html">Користувачі</a><a href="access.html">Надати доступ</a><a class="active" href="contours.html">Контури</a><a href="events.html">Журнал</a></nav>
      <div class="sidebar-footer"><button id="logoutBtn" class="logout-btn" type="button">Вийти</button></div>
    </aside>

    <main class="main">
      <div class="topbar"><h2>Контури доступу</h2><div class="user-pill" id="adminEmail"></div></div>

      <section class="cards contour-cards">
        <div class="card"><div id="contoursCount" class="num">—</div><div class="label">Контурів</div></div>
        <div class="card"><div id="membersCount" class="num">—</div><div class="label">Призначень</div></div>
        <div class="card"><div id="usersWithoutContour" class="num">—</div><div class="label">Без контуру</div></div>
      </section>

      <section class="panel">
        <div class="panel-header"><h3>Створити контур</h3></div>
        <div class="form-card-body">
          <div class="form-grid">
            <div class="field"><label>Назва контуру</label><input id="contourName" placeholder="Секція SEW"></div>
            <div class="field"><label>Опис</label><input id="contourDescription" placeholder="необов'язково"></div>
          </div>
          <div class="actions"><button id="createContourBtn" class="btn">Створити контур</button></div>
          <div id="contoursStatus" class="status"></div>
        </div>
      </section>

      <section class="panel table-panel">
        <div class="panel-header"><h3>Список контурів</h3><button id="reloadContours" class="small-btn">Оновити</button></div>
        <div id="notice"></div>
        <div class="table-wrap">
          <table class="table">
            <thead><tr><th>Назва</th><th>Опис</th><th>Учасники</th><th>Статус</th><th>Створено</th><th>Дії</th></tr></thead>
            <tbody id="contoursBody"><tr><td colspan="6">Завантаження...</td></tr></tbody>
          </table>
        </div>
      </section>

      <section class="panel" id="membersPanel" hidden>
        <div class="panel-header"><h3 id="membersTitle">Учасники контуру</h3></div>
        <div class="form-card-body compact">
          <div class="form-grid">
            <div class="field"><label>Додати користувача до вибраного контуру</label><select id="memberSelect"></select></div>
            <div class="field"><label>&nbsp;</label><button id="addMemberBtn" class="btn">Додати до контуру</button></div>
          </div>
        </div>
        <div class="table-wrap">
          <table class="table">
            <thead><tr><th>Маркер</th><th>Email</th><th>Роль</th><th>Додано</th><th>Дії</th></tr></thead>
            <tbody id="membersBody"><tr><td colspan="5">Оберіть контур</td></tr></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const { supabase } = window.rebusAuth;
      const A = window.rebusAdmin;
      const ctx = await A.getAdminContext(); if (!ctx) return;
      A.renderAdminProfile(document.getElementById('adminEmail'), ctx.session, ctx.admin);

      const state = { users: [], contours: [], memberships: [], selectedContourId: '' };
      const body = document.getElementById('contoursBody');
      const notice = document.getElementById('notice');
      const status = document.getElementById('contoursStatus');
      const membersPanel = document.getElementById('membersPanel');
      const membersBody = document.getElementById('membersBody');
      const memberSelect = document.getElementById('memberSelect');

      function setStatus(text, cls='') { status.textContent = text || ''; status.className = cls ? `status ${cls}` : 'status'; }
      function setNotice(text, cls='') { notice.innerHTML = text ? `<div class="notice ${cls}">${A.esc(text)}</div>` : ''; }
      function selectedContour(){ return state.contours.find(c => String(c.id) === String(state.selectedContourId)); }
      function userByMembership(m){ return state.users.find(u => String(u.id) === String(m.user_id || '') || String(u.email||'').toLowerCase() === String(m.email||'').toLowerCase()); }
      function contourMembers(contourId){ return state.memberships.filter(m => String(m.contour_id) === String(contourId)); }

      async function loadAll(){
        body.innerHTML = '<tr><td colspan="6">Завантаження...</td></tr>';
        setNotice('');
        const usersResp = await supabase.from('rebus_profiles').select('*').order('created_at', { ascending:false });
        if (usersResp.error) {
          const adminResp = await supabase.from('rebus_admin_access').select('*').order('created_at', { ascending:false });
          state.users = (adminResp.data || []).map(r => A.mapUser({...r, source:'admin_access'}));
        } else {
          state.users = (usersResp.data || []).map(r => A.mapUser({...r, source:'profiles'}));
        }
        const [contoursResp, membersResp] = await Promise.all([
          supabase.from('rebus_contours').select('*').order('created_at', { ascending:false }),
          supabase.from('rebus_contour_members').select('*')
        ]);
        if (contoursResp.error || membersResp.error) {
          body.innerHTML = '<tr><td colspan="6">Таблиці контурів ще не створені</td></tr>';
          setNotice(`Потрібно застосувати SQL з файлу supabase-contours.sql. ${contoursResp.error ? contoursResp.error.message : membersResp.error.message}`, 'error');
          return;
        }
        state.contours = contoursResp.data || [];
        state.memberships = membersResp.data || [];
        if (!state.selectedContourId && state.contours[0]) state.selectedContourId = state.contours[0].id;
        render();
      }

      function renderStats(){
        document.getElementById('contoursCount').textContent = state.contours.length;
        document.getElementById('membersCount').textContent = state.memberships.length;
        const assigned = new Set(state.memberships.map(m => String(m.user_id || m.email || '').toLowerCase()));
        const without = state.users.filter(u => !assigned.has(String(u.id).toLowerCase()) && !assigned.has(String(u.email).toLowerCase())).length;
        document.getElementById('usersWithoutContour').textContent = without;
      }

      function render(){
        renderStats();
        body.innerHTML = state.contours.length ? state.contours.map(c => {
          const count = contourMembers(c.id).length;
          const active = c.is_active !== false;
          return `<tr class="${String(c.id)===String(state.selectedContourId)?'selected-row':''}">
            <td><strong>${A.esc(c.name)}</strong></td>
            <td>${A.esc(c.description || '—')}</td>
            <td><span class="contour-pill">${count}</span></td>
            <td><span class="tag ${active?'':'off'}">${active?'Активний':'Вимкнений'}</span></td>
            <td>${A.esc(A.fmtDate(c.created_at))}</td>
            <td class="row-actions"><button class="small-btn" data-open-contour="${A.esc(c.id)}">Учасники</button><button class="small-btn ${active?'danger':''}" data-toggle-contour="${A.esc(c.id)}">${active?'Вимкнути':'Активувати'}</button></td>
          </tr>`;
        }).join('') : '<tr><td colspan="6">Контурів ще немає</td></tr>';
        renderMembers();
      }

      function renderMembers(){
        const c = selectedContour();
        if (!c) { membersPanel.hidden = true; return; }
        membersPanel.hidden = false;
        document.getElementById('membersTitle').textContent = `Учасники контуру: ${c.name}`;
        const members = contourMembers(c.id);
        const memberKeys = new Set(members.map(m => String(m.user_id || m.email || '').toLowerCase()));
        const available = state.users.filter(u => !memberKeys.has(String(u.id).toLowerCase()) && !memberKeys.has(String(u.email).toLowerCase()) && u.status !== 'deleted');
        memberSelect.innerHTML = available.length ? available.map(u => `<option value="${A.esc(u.id)}">${A.esc(u.marker)} — ${A.esc(u.email)} — ${A.esc(A.roleLabel(u.role))}</option>`).join('') : '<option value="">Немає доступних користувачів</option>';
        membersBody.innerHTML = members.length ? members.map(m => {
          const u = userByMembership(m) || {};
          const id = A.esc(m.id);
          return `<tr><td>${A.esc(m.marker || u.marker || '—')}</td><td>${A.esc(m.email || u.email || '—')}</td><td>${A.esc(A.roleLabel(m.role || u.role))}</td><td>${A.esc(A.fmtDate(m.created_at))}</td><td><button class="small-btn danger" data-remove-member="${id}">Прибрати</button></td></tr>`;
        }).join('') : '<tr><td colspan="5">У цьому контурі ще немає учасників</td></tr>';
      }

      async function createContour(){
        const name = document.getElementById('contourName').value.trim();
        const description = document.getElementById('contourDescription').value.trim();
        if (!name) { setStatus('Вкажи назву контуру.', 'error'); return; }
        setStatus('Створюю контур...');
        const { data, error } = await supabase.from('rebus_contours').insert({ name, description, is_active:true, created_by: ctx.session?.user?.email || null }).select().single();
        if (error) { setStatus(error.message || 'Не вдалося створити контур.', 'error'); return; }
        await A.logEvent(supabase, { marker:'ADMIN', email:ctx.session?.user?.email || '', action:`Створено контур: ${name}`, status:'success' });
        document.getElementById('contourName').value = '';
        document.getElementById('contourDescription').value = '';
        state.selectedContourId = data?.id || state.selectedContourId;
        setStatus('Контур створено.', 'ok');
        await loadAll();
      }

      async function addMember(){
        const c = selectedContour();
        const user = state.users.find(u => String(u.id) === String(memberSelect.value));
        if (!c || !user) return;
        setStatus('Додаю користувача до контуру...');
        const previous = state.memberships.filter(m => String(m.user_id || '') === String(user.id) || String(m.email || '').toLowerCase() === String(user.email || '').toLowerCase());
        for (const m of previous) await supabase.from('rebus_contour_members').delete().eq('id', m.id);
        const { error } = await supabase.from('rebus_contour_members').insert({ contour_id:c.id, user_id:user.id, email:user.email, marker:user.marker, role:user.role, added_by:ctx.session?.user?.email || null });
        if (error) { setStatus(error.message || 'Не вдалося додати учасника.', 'error'); return; }
        await A.logEvent(supabase, { marker:user.marker, email:user.email, action:`Додано до контуру: ${c.name}`, status:'success' });
        setStatus('Учасника додано до контуру.', 'ok');
        await loadAll();
      }

      async function removeMember(memberId){
        const m = state.memberships.find(x => String(x.id) === String(memberId));
        const c = selectedContour();
        const { error } = await supabase.from('rebus_contour_members').delete().eq('id', memberId);
        if (error) { setStatus(error.message || 'Не вдалося прибрати учасника.', 'error'); return; }
        await A.logEvent(supabase, { marker:m?.marker || '—', email:m?.email || '', action:`Прибрано з контуру: ${c?.name || ''}`, status:'success' });
        setStatus('Учасника прибрано з контуру.', 'ok');
        await loadAll();
      }

      async function toggleContour(contourId){
        const c = state.contours.find(x => String(x.id) === String(contourId));
        if (!c) return;
        const next = c.is_active === false;
        const { error } = await supabase.from('rebus_contours').update({ is_active: next, updated_at: new Date().toISOString() }).eq('id', contourId);
        if (error) { setStatus(error.message || 'Не вдалося оновити контур.', 'error'); return; }
        await A.logEvent(supabase, { marker:'ADMIN', email:ctx.session?.user?.email || '', action:`${next?'Активовано':'Вимкнено'} контур: ${c.name}`, status:'success' });
        await loadAll();
      }

      document.getElementById('createContourBtn').onclick = createContour;
      document.getElementById('reloadContours').onclick = loadAll;
      document.getElementById('addMemberBtn').onclick = addMember;
      document.addEventListener('click', e => {
        const open = e.target.closest('[data-open-contour]');
        if (open) { state.selectedContourId = open.dataset.openContour; render(); return; }
        const toggle = e.target.closest('[data-toggle-contour]');
        if (toggle) { toggleContour(toggle.dataset.toggleContour); return; }
        const remove = e.target.closest('[data-remove-member]');
        if (remove) { removeMember(remove.dataset.removeMember); }
      });
      await loadAll();
    });
  </script>
  <script src="js/logout.js" defer></script>
</body>
</html>
