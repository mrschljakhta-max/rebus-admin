<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REBUS Admin — Вхід</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js" defer></script>
</head>
<body class="bg-page bg-login">
  <main class="auth-card">
    <div class="brand">
      <img src="assets/key.png" alt="REBUS" />
      <h1>REBUS <span>Admin</span></h1>
    </div>
    <h2 class="title">Доступ до захищеного контуру</h2>
    <p class="sub">Увійдіть через Google-акаунт адміністратора. Після цього система перевірить доступ і запросить код 2FA.</p>
    <div class="stack">
      <button id="googleBtn" class="btn">Продовжити через Google</button>
    </div>
    <div id="status" class="status"></div>
  </main>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      const { supabase, setStatus, routeAfterLogin } = window.rebusAuth;
      const params = new URLSearchParams(location.search);
      if (params.get('error') === 'access_denied') setStatus('Доступ заборонено.', 'error');
      const { data } = await supabase.auth.getSession();
      if (data.session) await routeAfterLogin();
      document.getElementById('googleBtn').addEventListener('click', async () => {
        setStatus('Переадресовую на Google...');
        const redirectTo = location.origin + location.pathname.replace('index.html','') + 'index.html';
        const { error } = await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo } });
        if (error) setStatus(error.message, 'error');
      });
      supabase.auth.onAuthStateChange((_event, session) => { if (session) routeAfterLogin(); });
    });
  </script>
</body>
</html>
